name: Servoy Integration Test

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    branches:
      - "feature/**"
  workflow_dispatch:
    inputs:
      repo_branch:
        description: "Branch of the Servoy project to test"
        required: false
        default: "main"

jobs:
  servoy-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout servoy-deploy repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache the Docker image layers to speed up repeat builds
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker/Dockerfile', 'artificats/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Servoy test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          tags: servoy-test:ci
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Rotate cache to prevent unbounded growth
      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run Servoy deployment test
        env:
          REPO_URL: ${{ vars.SERVOY_PROJECT_REPO_URL }}
          REPO_BRANCH: ${{ github.event.inputs.repo_branch || github.ref_name }}
          PROJECT_NAME: ${{ vars.SERVOY_PROJECT_NAME }}
          # GITHUB_TOKEN is only needed if SERVOY_PROJECT_REPO_URL points to a private repo.
          # Store as a secret named SERVOY_REPO_TOKEN to keep it separate from the default token.
          GITHUB_TOKEN: ${{ secrets.SERVOY_REPO_TOKEN }}
        run: |
          docker run --rm \
            -e REPO_URL \
            -e REPO_BRANCH \
            -e PROJECT_NAME \
            -e GITHUB_TOKEN \
            servoy-test:ci

      - name: Upload Tomcat logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tomcat-logs
          path: /tmp/tomcat-logs/
          # The entrypoint writes Tomcat logs to stdout/stderr on failure;
          # to also capture them as an artifact, mount a volume and copy them here.
          # See docs/advanced-logging.md for setup instructions.
          if-no-files-found: ignore
